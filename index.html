<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>🌸 Projeto Site Ansiedade</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #4b2c5e;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #7c3aed;
    }

    p {
      font-size: 16px;
      color: #5b3a6e;
    }

    a {
      display: block;
      margin: 15px 0;
      padding: 12px;
      background: #a855f7;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    a:hover {
      background: #7c3aed;
      transform: scale(1.03);
    }

    .flowers {
      font-size: 24px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="flowers">🌸🌷💜🌸🌷</div>

    <h1>Projeto Site Ansiedade 🌸</h1>

    <p>
      Este projeto acadêmico tem como objetivo informar e conscientizar sobre a ansiedade,
      promovendo conhecimento sobre saúde mental de forma leve e educativa. 🌷
    </p>
    
    <a href="https://laixgameplay.github.io/SiteAnsiedade/" target="_blank">
      🌐 Acessar Aplicação Online 🌸
    </a>

    <a href="https://github.com/laixgameplay/SiteAnsiedade" target="_blank">
      💻 Ver Código no GitHub 🌷
    </a>

    <p class="flowers">💜🌸 Obrigado por visitar 🌸💜</p>

  </div>

</body>
</html>
